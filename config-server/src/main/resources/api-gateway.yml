server:
  port: 8082

spring:
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**

        - id: character-service
          uri: lb://character-service
          predicates:
            - Path=/api/characters/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/